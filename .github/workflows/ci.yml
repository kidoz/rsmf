name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Default workspace build — the gate users hit when they clone
          # the repo. Covers rsmf-core (safetensors+gguf+npy),
          # rsmf-cli, and rsmf-bench.
          - label: default
            flags: "--workspace --all-targets"
          # Minimal rsmf-core: no converters, no compression, no
          # parallel verify, no tracing. Catches feature-gated code
          # that only compiles when a feature is on.
          - label: core-no-default-features
            flags: "-p rsmf-core --all-targets --no-default-features"
          # Every optional rsmf-core feature pulled in at once, so the
          # cross-product of cfg gates is linted.
          - label: core-all-features
            flags: "-p rsmf-core --all-targets --all-features"
          # Individual optional features — catches interactions the
          # "all-features" build hides (e.g. a cfg that is exclusive of
          # another).
          - label: core-compression
            flags: "-p rsmf-core --all-targets --no-default-features --features compression"
          - label: core-parallel
            flags: "-p rsmf-core --all-targets --no-default-features --features parallel"
          - label: core-tracing
            flags: "-p rsmf-core --all-targets --no-default-features --features tracing"
          # GPU / runtime crates are excluded from default-members; lint
          # them explicitly so new warnings can't slip in.
          - label: wgpu
            flags: "-p rsmf-wgpu --all-targets"
          - label: bench-wgpu
            flags: "-p rsmf-bench --all-targets --features wgpu"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy ${{ matrix.flags }} -- -D warnings

  python-tests:
    name: Python bindings (pytest)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python build + test deps
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest numpy
          # torch is heavy; install the CPU wheel and safetensors only for
          # the --from-torch round-trip tests.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install safetensors

      - name: Build and install the rsmf Python extension
        working-directory: crates/rsmf-python
        run: maturin develop --release

      - name: Build the rsmf CLI (needed by conftest fixtures)
        run: cargo build -p rsmf-cli --release

      - name: Run pytest
        env:
          RSMF_BIN: ${{ github.workspace }}/target/release/rsmf
        run: pytest crates/rsmf-python/tests/ -v

  cargo-package:
    name: cargo package (release dry run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # `cargo package` refuses to run when the working tree carries
      # untracked / uncommitted files the crate would ship. Running it in
      # CI on every PR catches the "forgot to commit a new test file"
      # class of blockers the local checklist missed in the past.
      # rsmf-core is the only publishable crate today; rsmf-cli's path+
      # version dep on rsmf-core cannot be verified until rsmf-core is
      # live on crates.io, so we only gate the library crate here.
      - name: Verify rsmf-core packages cleanly for crates.io
        run: cargo package -p rsmf-core --no-verify

  wheel-build:
    name: maturin wheel (PyPI dry run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install maturin
        run: |
          python -m pip install --upgrade pip
          pip install 'maturin>=1.5,<2.0'
      - name: Build release wheel
        working-directory: crates/rsmf-python
        run: maturin build --release
      # Fail the job if the wheel leaked any bytecode cache or stray
      # pre-built extensions from the source tree. The pyproject exclude
      # rules enforce this, but the CI guard keeps the rule honest.
      - name: Inspect wheel contents for forbidden artefacts
        run: |
          set -euo pipefail
          whl=$(ls target/wheels/*.whl | head -n1)
          echo "Inspecting $whl"
          contents=$(unzip -l "$whl")
          echo "$contents"
          if echo "$contents" | grep -E '(__pycache__|\.pyc$|\.pyo$)'; then
            echo "::error::wheel contains forbidden bytecode / cache artefacts"
            exit 1
          fi
