name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  python-tests:
    name: Python bindings (pytest)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python build + test deps
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest numpy
          # torch is heavy; install the CPU wheel and safetensors only for
          # the --from-torch round-trip tests.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install safetensors

      - name: Build and install the rsmf Python extension
        working-directory: crates/rsmf-python
        run: maturin develop --release

      - name: Build the rsmf CLI (needed by conftest fixtures)
        run: cargo build -p rsmf-cli --release

      - name: Run pytest
        env:
          RSMF_BIN: ${{ github.workspace }}/target/release/rsmf
        run: pytest crates/rsmf-python/tests/ -v
